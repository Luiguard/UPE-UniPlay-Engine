<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UniPlay Engine - Interactive Consensus Demo</title>
  <style>
    body {
      background: #08090d;
      color: #f1f5f9;
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }
    .grid-container {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 20px;
      height: calc(100vh - 40px);
    }
    .canvas-wrapper {
      background: #13151f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .panel {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
    
    .node-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .node {
      background: #0e1017;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .node-active {
      border-color: #10b981;
      background: rgba(16,185,129,0.05);
    }
    .node-cheating {
      border-color: #ef4444;
      background: rgba(239,68,68,0.1);
    }
    .node-icon { font-size: 1.2rem; }
    .node-details { flex: 1; margin-left: 10px; }
    .node-name { font-size: 0.85rem; font-weight: bold; }
    .node-status { font-size: 0.7rem; color: #94a3b8; }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
    }
    button {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button.btn-danger {
      background: linear-gradient(135deg, #ef4444, #f59e0b);
    }

    .log-container {
      height: 120px;
      overflow-y: auto;
      background: #000;
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #10b981;
    }
    .log-line { margin-bottom: 4px; }
    .log-warn { color: #f59e0b; }
    
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="grid-container">
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>
    
    <div class="panel">
      <h3>Global Consensus Nodes</h3>
      
      <div class="node-list">
        <!-- Will be populated by JS -->
        <div id="node0" class="node">
           <div class="node-icon">💻</div>
           <div class="node-details">
             <div class="node-name">Worker A</div>
             <div class="node-status">Status: Waiting</div>
           </div>
        </div>
        <div id="node1" class="node">
           <div class="node-icon">💻</div>
           <div class="node-details">
             <div class="node-name">Worker B</div>
             <div class="node-status">Status: Waiting</div>
           </div>
        </div>
        <div id="node2" class="node">
           <div class="node-icon">💻</div>
           <div class="node-details">
             <div class="node-name">Worker C</div>
             <div class="node-status">Status: Waiting</div>
           </div>
        </div>
      </div>

      <div class="stats">
        <span>Active Tasks: <span id="statTasks">0</span></span>
        <span>Consensus: <span id="statConsensus">0%</span></span>
      </div>

      <div class="log-container" id="logger">
      </div>

      <div class="button-group">
        <button id="btnCheat" class="btn-danger">😈 Make Worker B Cheat</button>
        <button id="btnLag">🐌 Simulate Network Lag</button>
      </div>
    </div>
  </div>

  <!-- Import the bundled UniPlay SDK -->
  <script type="module" src="client-bundle.js"></script>
  
  <script type="module">
    import { UniPlayClient } from './client-bundle.js';

    // UI Elements
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const logger = document.getElementById('logger');
    let W, H;

    function resize() {
      W = canvas.width = canvas.parentElement.clientWidth;
      H = canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function log(msg, type='info') {
      const line = document.createElement('div');
      line.className = `log-line ${type==='warn' ? 'log-warn' : ''}`;
      line.innerText = `> ${msg}`;
      logger.appendChild(line);
      logger.scrollTop = logger.scrollHeight;
    }

    log("Initializing UniPlay Core...");
    log("Spinning up 3 local Worker Nodes...");

    // We instantiate 3 clients to act as our Consensus Quorum
    const clients = [];
    const isCheating = [false, false, false];
    let tasksCompleted = 0;

    for (let i = 0; i < 3; i++) {
        const client = new UniPlayClient(`worker_${i}`, { serverUrl: 'ws://localhost:3000' });
        
        // Define what this client does when it receives a PHYSICS_STEP
        client.taskExecutor.registerHandler(0 /* PHYSICS_STEP */, (task) => {
            const data = task.data;
            if (!data.currentPos) return { position: { x: 50, y: 50, z: 0 } };
            
            let newX = data.currentPos.x + 3; // move right
            let newY = data.currentPos.y;
            
            // Loop screen
            if (newX > W) newX = 0;
            
            // SIMULATE CHEATING Step 8 (Divergence)
            if (isCheating[i]) {
                newY += 50; // Try to move down illegitimately!
                document.getElementById(`node${i}`).classList.add('node-cheating');
                document.querySelector(`#node${i} .node-status`).innerText = "Status: Injecting Hack...";
            } else {
                document.getElementById(`node${i}`).classList.add('node-active');
                document.querySelector(`#node${i} .node-status`).innerText = "Status: Executing 2ms task";
            }

            setTimeout(() => {
                document.getElementById(`node${i}`).classList.remove('node-active');
            }, 100);

            tasksCompleted++;
            document.getElementById('statTasks').innerText = Math.floor(tasksCompleted / 3);
            
            return {
                position: { x: newX, y: newY, z: 0 }
            };
        });

        // Debug Log receiver from server
        client.transport.registerHandler(0xff, (payload) => {
            if (i === 0) log(payload.message, 'warn');
        });

        clients.push(client);
    }

    // Connect all
    Promise.all(clients.map(c => c.connect())).then(() => {
        log("Connected all 3 nodes to Server Anchor.");
    }).catch(e => {
        log("Server not running. Start demo-server.mjs!", "warn");
    });

    // We will render from the authoritative Server State via Client 0
    let renderPos = { x: 50, y: 50 };

    clients[0].transport.registerHandler(0x02 /* STATE_UPDATE */, (payload) => {
        const p1 = payload.entities.find(e => e.entityId === 'player_1');
        if (p1) {
            // Apply visual smoothing (Mechanism #18)
            renderPos = clients[0].visual.updateRenderPosition('p1', p1.position, null, 1/60);
        }
    });

    // Render loop
    function draw() {
        ctx.fillStyle = 'rgba(19, 21, 31, 0.3)';
        ctx.fillRect(0, 0, W, H);

        // Draw Entity
        ctx.beginPath();
        ctx.arc(renderPos.x, renderPos.y, 25, 0, Math.PI * 2);
        
        // Glow
        ctx.shadowColor = '#06b6d4';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#06b6d4';
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#fff';
        ctx.font = '12px Inter';
        ctx.textAlign = 'center';
        ctx.fillText("Authoritative State", renderPos.x, renderPos.y - 35);
        ctx.fillText(`Hash Validated by Quorum`, renderPos.x, renderPos.y + 45);

        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // Buttons
    document.getElementById('btnCheat').addEventListener('click', (e) => {
        isCheating[1] = !isCheating[1];
        const btn = e.target;
        if (isCheating[1]) {
            btn.innerText = "🚨 Worker B is Cheating!";
            btn.style.background = "#ef4444";
        } else {
            btn.innerText = "😈 Make Worker B Cheat";
            btn.style.background = "linear-gradient(135deg, #ef4444, #f59e0b)";
            document.getElementById(`node1`).classList.remove('node-cheating');
            document.querySelector(`#node1 .node-status`).innerText = "Status: Waiting";
        }
    });

  </script>
</body>
</html>
